<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>FF14 桌遊審核後台</title>
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <style>
        :root { --gold: #d4af37; --bg: #0f0f0f; --card: #1e1e1e; --text: #f0f0f0; --green: #2ecc71; --red: #e74c3c; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: #111; color: var(--text); padding: 20px; }
        .section-box { background: var(--card); padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #333; }
        input, select, button { width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 5px; border: 1px solid #444; background: #222; color: #fff; }
        button.primary { background: var(--gold); color: #000; font-weight: bold; cursor: pointer; }
        .admin-member-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; background: #000; padding: 10px; border-radius: 8px; margin-top: 10px; }
    </style>
</head>
<body>
    <h2>FF14 桌遊管理者面板</h2>
    <div class="section-box">
        <h3>1. 發布營業時段</h3>
        <input type="date" id="opDate">
        <div style="display:flex; gap:5px;"><input type="time" id="opStart" value="18:00"> 至 <input type="time" id="opEnd" value="23:00"></div>
        <button class="primary" onclick="addOp()">確認發布</button>
    </div>
    <div class="section-box"><h3>2. 營業時段管理</h3><div id="opList">載入中...</div></div>
    <div class="section-box"><h3>3. 預約審核中心</h3><div id="bkList">載入中...</div></div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDlfxbnfyGu7Uhgp2ULZukcOwrPve5IYuY",
  authDomain: "://firebaseapp.com",
  databaseURL: "https://firebasedatabase.app",
  projectId: "ff14-boardgame",
  storageBucket: "ff14-boardgame.firebasestorage.app",
  messagingSenderId: "1065149131631",
  appId: "1:1065149131631:web:89281ad9cc8f76172c969a"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function addOp() {
    const d = document.getElementById('opDate').value, s = document.getElementById('opStart').value, e = document.getElementById('opEnd').value;
    const id = Date.now();
    db.ref('opSlots/' + id).set({ id, date: d, start: s, end: e });
}

db.ref('opSlots').on('value', snap => {
    const data = snap.val() || {};
    document.getElementById('opList').innerHTML = Object.values(data).map(o => `
        <div style="margin-bottom:8px; border-bottom:1px solid #333; padding-bottom:5px; display:flex; justify-content:space-between;">
            <span>📅 ${o.date} (${o.start}-${o.end})</span>
            <button onclick="db.ref('opSlots/${o.id}').remove()" style="width:auto; padding:2px 8px; background:var(--red);">刪除</button>
        </div>`).join('') || '目前無時段';
});

db.ref('bookings').on('value', snap => {
    const data = snap.val() || {};
    document.getElementById('bkList').innerHTML = Object.values(data).map(b => `
        <div style="background:#252525; padding:12px; margin-bottom:10px; border-radius:8px; border-left: 5px solid ${b.status==='pending'?'#888':'var(--green)'}">
            <strong>${b.game} - ${b.title}</strong> [${b.status==='pending'?'待審核':'成功'}]<br>
            <div class="admin-member-grid">${b.names.map((n, i) => `<div style="font-size:0.8em; color:#bbb;">${i+1}. ${n}</div>`).join('')}</div>
            <div style="margin-top:10px;">
                ${b.status==='pending'?`<button onclick="db.ref('bookings/${b.id}').update({status:'success'})" style="background:var(--green); width:auto; padding:4px 10px;">通過</button>`:''}
                <button onclick="db.ref('bookings/${b.id}').remove()" style="background:#444; width:auto; padding:4px 10px;">刪除</button>
            </div>
        </div>`).join('') || '無預約申請';
});
</script>
</body>
</html>
