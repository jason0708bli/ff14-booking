<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>FF14 審核後台 v13.0</title>
    <style>
        :root { --gold: #d4af37; --bg: #111; --card: #222; }
        body { font-family: sans-serif; background: var(--bg); color: #eee; padding: 20px; text-align: center; }
        .box { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #444; max-width: 600px; margin: 0 auto 20px; }
        input, button { width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 6px; box-sizing: border-box; }
        button { background: var(--gold); font-weight: bold; cursor: pointer; border: none; }
        .item { background: #000; padding: 15px; border-radius: 8px; margin-top: 8px; display: flex; flex-direction: column; text-align: left; border: 1px solid #333; }
        .row-btn { display: flex; gap: 10px; margin-top: 10px; }
        .name-tag { display: inline-block; background: #333; padding: 2px 8px; border-radius: 4px; font-size: 0.8em; margin-right: 5px; margin-top: 5px; color: #ddd; }
    </style>
</head>
<body>

<div class="box">
    <h2 style="color:var(--gold);">管理者控制中心</h2>
    <input type="date" id="opDate">
    <div style="display:flex; gap:10px;"><input type="time" id="opStart" value="18:00"><input type="time" id="opEnd" value="23:00"></div>
    <button id="addBtn" onclick="addOp()">發布新時段</button>
</div>

<div class="box">
    <h3>預約審核中心</h3>
    <div id="bkList">讀取中...</div>
</div>

<div class="box">
    <h3>看板時段管理</h3>
    <div id="opList">讀取中...</div>
</div>

<script>
const API_URL = "https://google.com";
let allData = [];

async function fetchData() {
    const res = await fetch(API_URL);
    allData = await res.json();
    render();
}

async function addOp() {
    const d = document.getElementById('opDate').value;
    if(!d) return alert("選日期");
    const payload = { action: "insert", data: { id: "slot_"+Date.now(), date: d, start: document.getElementById('opStart').value, end: document.getElementById('opEnd').value, type: 'slot', status: 'active', game: "-", title: "-", names: "-", max: "-" } };
    await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
    alert("已成功寫入試算表！"); setTimeout(fetchData, 1500);
}

function render() {
    const slots = allData.filter(i => i.type === 'slot');
    const bks = allData.filter(i => i.type === 'booking');

    document.getElementById('opList').innerHTML = slots.map(o => `
        <div class="item" style="flex-direction:row; justify-content:space-between; align-items:center;">
            <span>📅 ${o.date} (${o.start}-${o.end})</span>
            <button onclick="del('${o.id}')" style="width:auto; background:red; color:white; padding:4px 8px;">刪除</button>
        </div>`).join('') || "無時段";

    document.getElementById('bkList').innerHTML = bks.map(b => `
        <div class="item" style="border-left:4px solid ${b.status==='pending'?'#888':'#2ecc71'}">
            <strong>${b.game} - ${b.title}</strong>
            <small style="color:#888;">${b.date} | ${b.start}-${b.end}</small>
            <div>${b.names.split(', ').map(n => `<span class="name-tag">${n}</span>`).join('')}</div>
            <div class="row-btn">
                ${b.status==='pending'?`<button onclick="update('${b.id}','success')" style="background:green; color:white; padding:4px 10px;">核准</button>`:''}
                <button onclick="del('${b.id}')" style="background:#444; color:white; padding:4px 10px;">刪除</button>
            </div>
        </div>`).join('') || "目前無預約";
}

function update(id, status) { fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: "update", id: id, status: status }) }).then(() => setTimeout(fetchData, 1000)); }
function del(id) { if(confirm("刪除？")) fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: "delete", id: id }) }).then(() => setTimeout(fetchData, 1000)); }

fetchData();
</script>
</body>
</html>
