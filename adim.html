<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>FF14 審核後台 v13.5</title>
    <style>
        :root { --gold: #d4af37; --bg: #0f0f0f; --card: #1e1e1e; --text: #f0f0f0; --green: #2ecc71; --red: #e74c3c; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        body { font-family: "Microsoft JhengHei", sans-serif; background: #111; color: var(--text); padding: 20px; text-align: center; }
        .container { width: 95%; max-width: 800px; margin: 0 auto; }
        .box { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #444; margin-bottom: 20px; }
        h2, h3 { color: var(--gold); border-left: 5px solid var(--gold); padding-left: 15px; text-align: left; }
        input, button { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #444; background: #111; color: #fff; box-sizing: border-box; }
        button { background: var(--gold); color: #000; font-weight: bold; cursor: pointer; border: none; transition: 0.3s; }
        button:hover { filter: brightness(1.2); }
        button:disabled { background: #444; color: #888; cursor: not-allowed; }
        
        .item-card { background: #000; padding: 15px; border-radius: 10px; margin-top: 10px; text-align: left; border: 1px solid #333; animation: fadeIn 0.5s; }
        .status-badge { padding: 2px 8px; border-radius: 4px; font-size: 0.75em; font-weight: bold; margin-bottom: 8px; display: inline-block; }
        .pending { background: #666; } .success { background: var(--green); }
        
        .name-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin: 10px 0; background: #1a1a1a; padding: 10px; border-radius: 8px; border: 1px solid #222; }
        .name-tag { font-size: 0.85em; color: #ddd; border-bottom: 1px solid #333; padding: 2px 0; }
        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        .btn-small { width: auto; padding: 6px 15px; font-size: 0.85em; margin: 0; }
    </style>
</head>
<body>

<div class="container">
    <div style="display:flex; justify-content: space-between; align-items: center;">
        <h2>管理者工作台</h2>
        <div id="conn-hint" style="font-size: 0.7em; color: #888;">📡 雲端通訊準備中...</div>
    </div>

    <div class="box">
        <h3>1. 發布看板營業時段</h3>
        <label style="display:block; text-align:left; font-size:0.8em; color:#888; margin-bottom:5px;">選擇開放日期</label>
        <input type="date" id="opDate">
        <div style="display:flex; gap:10px;">
            <div style="flex:1;"><label style="display:block; text-align:left; font-size:0.8em; color:#888;">開始時間</label><input type="time" id="opStart" value="18:00"></div>
            <div style="flex:1;"><label style="display:block; text-align:left; font-size:0.8em; color:#888;">結束時間</label><input type="time" id="opEnd" value="23:00"></div>
        </div>
        <button id="addBtn" onclick="addOp()">確認發布到看板</button>
    </div>

    <div class="box">
        <h3>2. 預約審核中心 (詳細名單)</h3>
        <div id="bkList">讀取雲端資料中...</div>
    </div>

    <div class="box">
        <h3>3. 時段管理</h3>
        <div id="opList">讀取中...</div>
    </div>
</div>

<script>
// 你的 Google Apps Script 網址
const API_URL = "https://google.com";
let allData = [];

// 讀取資料
async function fetchData() {
    try {
        const res = await fetch(API_URL);
        allData = await res.json();
        document.getElementById('conn-hint').innerText = "🟢 雲端同步完成";
        document.getElementById('conn-hint').style.color = "var(--green)";
        render();
    } catch (e) {
        document.getElementById('conn-hint').innerText = "🔴 連線異常";
        console.error("Fetch Error:", e);
    }
}

// 發布時段
async function addOp() {
    const d = document.getElementById('opDate').value;
    if(!d) return alert("請選日期");
    
    const btn = document.getElementById('addBtn');
    btn.disabled = true; btn.innerText = "正在傳送至 Google...";

    const payload = {
        action: "insert",
        data: {
            id: "slot_" + Date.now(),
            date: d,
            start: document.getElementById('opStart').value,
            end: document.getElementById('opEnd').value,
            type: "slot",
            status: "active",
            game: "-", title: "-", names: "-", max: "-"
        }
    };

    // 使用 POST 提交，即使 CORS 報錯，資料通常也會進去
    fetch(API_URL, {
        method: 'POST',
        mode: 'no-cors',
        body: JSON.stringify(payload)
    }).then(() => {
        alert("✅ 指令已發出！\nGoogle 處理需要時間，請於 5 秒後按確定。");
        setTimeout(fetchData, 3000);
    }).finally(() => {
        btn.disabled = false; btn.innerText = "確認發布到看板";
    });
}

function render() {
    const slots = allData.filter(i => i.type === 'slot');
    const bks = allData.filter(i => i.type === 'booking');

    // 渲染預約審核
    document.getElementById('bkList').innerHTML = bks.map(b => {
        // 解析名字字串
        const nameArray = b.names ? b.names.split(', ') : [];
        return `
        <div class="item-card" style="border-left: 5px solid ${b.status==='pending'?'#888':'var(--green)'}">
            <div class="status-badge ${b.status}">${b.status==='pending'?'待審核':'預約成功'}</div>
            <div style="display:flex; justify-content: space-between;">
                <strong>${b.game} - ${b.title}</strong>
                <small style="color:#aaa;">${b.date} | ${b.start}-${b.end}</small>
            </div>
            
            <div class="name-grid">
                ${nameArray.map((n, i) => `<div class="name-tag">${i+1}. ${n}</div>`).join('')}
            </div>

            <div class="btn-group">
                ${b.status==='pending' ? `<button class="btn-small" style="background:var(--green); color:white;" onclick="updateStatus('${b.id}','success')">通過核准</button>` : ''}
                <button class="btn-small" style="background:#444; color:white;" onclick="delRow('${b.id}')">刪除紀錄</button>
            </div>
        </div>`;
    }).join('') || "目前沒有預約申請。";

    // 渲染時段管理
    document.getElementById('opList').innerHTML = slots.map(o => `
        <div class="item-card" style="display:flex; justify-content: space-between; align-items: center;">
            <span>📅 ${o.date} | 🕒 ${o.start} - ${o.end}</span>
            <button class="btn-small" style="background:var(--red); color:white;" onclick="delRow('${o.id}')">下架時段</button>
        </div>`).join('') || "看板上目前沒有時段。";
}

// 修改狀態 (通過)
function updateStatus(id, newStatus) {
    document.getElementById('conn-hint').innerText = "⏳ 正在更新狀態...";
    fetch(API_URL, {
        method: 'POST',
        mode: 'no-cors',
        body: JSON.stringify({ action: "update", id: id, status: newStatus })
    }).then(() => {
        setTimeout(fetchData, 2000);
    });
}

// 刪除行
function delRow(id) {
    if(!confirm("確定要刪除這筆資料嗎？")) return;
    document.getElementById('conn-hint').innerText = "⏳ 正在執行刪除...";
    fetch(API_URL, {
        method: 'POST',
        mode: 'no-cors',
        body: JSON.stringify({ action: "delete", id: id })
    }).then(() => {
        setTimeout(fetchData, 2000);
    });
}

// 進入頁面先讀取一次
fetchData();
</script>
</body>
</html>
