<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>FF14 桌遊管理後台</title>
    <!-- 使用相容性最強的 SDK 連結 -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <style>
        :root { --gold: #d4af37; --bg: #111; --card: #222; --text: #eee; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); text-align: center; padding: 20px; }
        .box { background: #222; padding: 20px; border-radius: 12px; border: 1px solid #444; max-width: 450px; margin: 0 auto 20px; }
        input, button { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #444; box-sizing: border-box; }
        button { background: var(--gold); color: #000; font-weight: bold; cursor: pointer; border: none; }
        #conn-msg { font-weight: bold; margin-bottom: 15px; }
        .item { background: #000; padding: 10px; border-radius: 8px; margin-top: 10px; display: flex; justify-content: space-between; align-items: center; text-align: left; }
    </style>
</head>
<body>

<div class="box">
    <h2 style="color:var(--gold);">管理者工作台</h2>
    <div id="conn-msg">🔄 乙太網路連線中...</div>
    <input type="date" id="opDate">
    <div style="display:flex; gap:10px;">
        <input type="time" id="opStart" value="18:00">
        <input type="time" id="opEnd" value="23:00">
    </div>
    <button id="pubBtn" onclick="addOp()" disabled>等待連線...</button>
</div>

<div class="box">
    <h3>目前看板時段</h3>
    <div id="opList">讀取中...</div>
</div>

<div class="box">
    <h3>預約審核</h3>
    <div id="bkList">無申請資料</div>
</div>

<script>
// 填入你的專屬 Config (已校對)
const firebaseConfig = {
  apiKey: "AIzaSyDlfxbnfyGu7Uhgp2ULZukcOwrPve5IYuY",
  authDomain: "ff14-boardgame.firebaseapp.com",
  databaseURL: "https://ff14-boardgame-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "ff14-boardgame",
  storageBucket: "ff14-boardgame.firebasestorage.app",
  messagingSenderId: "1065149131631",
  appId: "1:1065149131631:web:89281ad9cc8f76172c969a"
};

// 初始化
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const connMsg = document.getElementById('conn-msg');
const pubBtn = document.getElementById('pubBtn');

// 監測連線
db.ref(".info/connected").on("value", (snap) => {
    if (snap.val() === true) {
        connMsg.innerText = "🟢 已成功連線至雲端資料庫";
        connMsg.style.color = "#2ecc71";
        pubBtn.disabled = false;
        pubBtn.innerText = "確認發布時段";
    } else {
        connMsg.innerText = "🔴 連線失敗，請檢查網路或 Firebase 規則";
        connMsg.style.color = "#e74c3c";
    }
});

function addOp() {
    const d = document.getElementById('opDate').value;
    if(!d) return alert("請選日期");
    const id = Date.now();
    db.ref('opSlots/' + id).set({
        id: id, date: d,
        start: document.getElementById('opStart').value,
        end: document.getElementById('opEnd').value
    }).then(() => alert("✅ 已發布到看板"));
}

db.ref('opSlots').on('value', snap => {
    const data = snap.val();
    document.getElementById('opList').innerHTML = data ? Object.values(data).map(o => `
        <div class="item">
            <span>📅 ${o.date} (${o.start}-${o.end})</span>
            <button onclick="db.ref('opSlots/${o.id}').remove()" style="width:auto; padding:5px; background:red; color:white;">刪除</button>
        </div>`).join('') : "看板是空的";
});

db.ref('bookings').on('value', snap => {
    const data = snap.val();
    document.getElementById('bkList').innerHTML = data ? Object.values(data).map(b => `
        <div class="item" style="border-left:4px solid ${b.status==='pending'?'#888':'#2ecc71'}">
            <div>
                <strong>${b.game}</strong> [${b.status}]<br>
                <small>${b.date} ${b.start}-${b.end}</small>
            </div>
            <div>
                ${b.status==='pending' ? `<button onclick="db.ref('bookings/${b.id}').update({status:'success'})" style="width:auto; background:green; color:white; padding:5px;">通過</button>` : ''}
                <button onclick="db.ref('bookings/${b.id}').remove()" style="width:auto; background:#444; color:white; padding:5px;">刪</button>
            </div>
        </div>`).join('') : "無預約";
});
</script>
</body>
</html>
