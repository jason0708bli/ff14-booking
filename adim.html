<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>FF14 旗艦管理後台 v16.0</title>
    <style>
        :root { --gold: #d4af37; --bg: #111; --card: #222; --green: #2ecc71; --red: #e74c3c; }
        body { font-family: sans-serif; background: #111; color: #eee; padding: 20px; text-align: center; }
        .box { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #444; max-width: 600px; margin: 0 auto 20px; text-align: left; }
        h2, h3 { color: var(--gold); }
        input, select, button { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 6px; border: 1px solid #444; background: #111; color: #fff; box-sizing: border-box; }
        button.primary { background: var(--gold); color: #000; font-weight: bold; cursor: pointer; border: none; }
        .item-card { background: #000; padding: 15px; border-radius: 10px; margin-top: 10px; border: 1px solid #333; }
        .name-tag { display: inline-block; background: #333; padding: 2px 8px; border-radius: 4px; font-size: 0.8em; margin: 3px; }
    </style>
</head>
<body>

<div class="box">
    <h2>管理者控制台 v16.0</h2>
    <div id="conn-hint" style="color: #f1c40f;">📡 乙太網路連線中...</div>
    <hr style="border:0.5px solid #333; margin:15px 0;">
    <input type="date" id="opDate">
    <div style="display:flex; gap:10px;"><input type="time" id="opStart" value="18:00"><input type="time" id="opEnd" value="23:00"></div>
    <button class="primary" onclick="addOp()">發布營業時段</button>
</div>

<div class="box"><h3>預約審核</h3><div id="bkList">讀取中...</div></div>
<div class="box"><h3>時段管理</h3><div id="opList">讀取中...</div></div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwNCsVr993_vYwObLyu2ftHEkpP54CYFg72-K3PGG4Hyt4ibuEglsVWoSDJ5Op71fooeQ/exec";
    let allData = [];

    // --- 核心：使用 JSONP 讀取，完全避開 CORS ---
    function fetchData() {
        const script = document.createElement('script');
        script.src = `${API_URL}?callback=handleResponse&t=${Date.now()}`;
        document.body.appendChild(script);
        document.body.removeChild(script);
    }

    function handleResponse(data) {
        allData = data;
        document.getElementById('conn-hint').innerText = "🟢 雲端乙太網路已對接";
        render();
    }

    // --- 核心：寫入邏輯 ---
    function sendAction(payload) {
        fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) })
        .then(() => {
            alert("✅ 指令已送出");
            setTimeout(fetchData, 3000);
        });
    }

    function addOp() {
        const d = document.getElementById('opDate').value;
        if(!d) return alert("請選日期");
        sendAction({ action: "insert", data: { id: "slot_"+Date.now(), date: d, start: document.getElementById('opStart').value, end: document.getElementById('opEnd').value, type: "slot", status: "active", game: "-", title: "-", names: "-", max: "-" } });
    }

    function updateStatus(id, s) { sendAction({ action: "update", id, status: s }); }
    function delRow(id) { if(confirm("確定刪除？")) sendAction({ action: "delete", id }); }

    function render() {
        const slots = allData.filter(i => i.type === 'slot');
        const bks = allData.filter(i => i.type === 'booking');

        document.getElementById('opList').innerHTML = slots.map(o => `
            <div class="item-card" style="display:flex; justify-content:space-between; align-items:center;">
                <span>📅 ${o.date} | ${o.start}-${o.end}</span>
                <button onclick="delRow('${o.id}')" style="width:auto; background:var(--red); color:white; padding:4px 8px;">刪除</button>
            </div>`).join('') || "無時段";

        document.getElementById('bkList').innerHTML = bks.map(b => `
            <div class="item-card">
                <strong>${b.game} - ${b.title}</strong> [${b.status}]<br>
                <small>${b.date} | ${b.start}</small>
                <div style="margin:5px 0;">${b.names.split(', ').map(n => `<span class="name-tag">${n}</span>`).join('')}</div>
                ${b.status==='pending'?`<button onclick="updateStatus('${b.id}','success')" style="background:var(--green); color:white; padding:5px 10px; width:auto;">通過</button>`:''}
                <button onclick="delRow('${b.id}')" style="background:#444; color:white; padding:5px 10px; width:auto; margin-left:5px;">刪除</button>
            </div>`).join('') || "無預約";
    }

    fetchData();
</script>
</body>
</html>
