<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>FF14 桌遊店管理後台</title>
    <!-- 使用穩定版的 Firebase SDK -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <style>
        :root { --gold: #d4af37; --bg: #111; --card: #222; --text: #f0f0f0; --green: #2ecc71; --red: #e74c3c; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .section-box { background: var(--card); padding: 20px; border-radius: 12px; margin-bottom: 25px; border: 1px solid #444; max-width: 600px; margin-left: auto; margin-right: auto; }
        h2, h3 { color: var(--gold); text-align: center; }
        input, select, button { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #444; background: #000; color: #fff; box-sizing: border-box; margin-bottom: 15px; font-size: 1em; }
        button.primary { background: linear-gradient(135deg, #d4af37, #b8860b); color: #000; border: none; font-weight: bold; cursor: pointer; }
        button.primary:hover { filter: brightness(1.2); }
        .list-item { background: #000; padding: 10px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #333; }
        .admin-member-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; background: #000; padding: 10px; border-radius: 8px; margin-top: 10px; border: 1px solid #333; }
    </style>
</head>
<body>

<div class="section-box">
    <h2>管理者面板</h2>
    <h3>1. 發布營業時段</h3>
    <label>日期</label>
    <input type="date" id="opDate">
    <div style="display:flex; gap:10px;">
        <div style="flex:1;"><label>開始</label><input type="time" id="opStart" value="18:00"></div>
        <div style="flex:1;"><label>結束</label><input type="time" id="opEnd" value="23:00"></div>
    </div>
    <button class="primary" onclick="addOp()">確認發布到看板</button>
</div>

<div class="section-box">
    <h3>2. 營業時段管理</h3>
    <div id="opList">連線中...</div>
</div>

<div class="section-box">
    <h3>3. 預約審核中心</h3>
    <div id="bkList">載入中...</div>
</div>

<script>
// 你的 Firebase 設定
const firebaseConfig = {
  apiKey: "AIzaSyDlfxbnfyGu7Uhgp2ULZukcOwrPve5IYuY",
  authDomain: "://firebaseapp.com",
  databaseURL: "https://firebasedatabase.app",
  projectId: "ff14-boardgame",
  storageBucket: "ff14-boardgame.firebasestorage.app",
  messagingSenderId: "1065149131631",
  appId: "1:1065149131631:web:89281ad9cc8f76172c969a"
};

// 初始化 Firebase
if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
}
const db = firebase.database();

// 測試連線
db.ref(".info/connected").on("value", (snap) => {
  if (snap.val() === true) {
    console.log("資料庫連線成功！");
  } else {
    console.warn("資料庫連線失敗，請檢查網路或 Firebase 設定。");
  }
});

// 新增時段
function addOp() {
    const d = document.getElementById('opDate').value;
    const s = document.getElementById('opStart').value;
    const e = document.getElementById('opEnd').value;
    
    if(!d || !s || !e) {
        alert("請完整填寫日期與時間！");
        return;
    }

    const id = Date.now();
    db.ref('opSlots/' + id).set({
        id: id,
        date: d,
        start: s,
        end: e
    }).then(() => {
        alert("✅ 時段已成功發布！");
    }).catch((error) => {
        alert("❌ 發布失敗：" + error.message);
    });
}

// 監聽時段列表
db.ref('opSlots').on('value', snap => {
    const data = snap.val();
    const listDiv = document.getElementById('opList');
    if (!data) {
        listDiv.innerHTML = "目前沒有開放時段。";
        return;
    }
    listDiv.innerHTML = Object.values(data).map(o => `
        <div class="list-item">
            <span>📅 ${o.date} (${o.start}-${o.end})</span>
            <button onclick="deleteOp('${o.id}')" style="width:auto; padding:5px 10px; background:var(--red); color:white; border:none; border-radius:4px; cursor:pointer;">刪除</button>
        </div>
    `).join('');
});

function deleteOp(id) {
    if(confirm("確定要刪除這個時段嗎？")) {
        db.ref('opSlots/' + id).remove();
    }
}

// 監聽預約列表
db.ref('bookings').on('value', snap => {
    const data = snap.val();
    const bkDiv = document.getElementById('bkList');
    if (!data) {
        bkDiv.innerHTML = "目前無預約申請。";
        return;
    }
    bkDiv.innerHTML = Object.values(data).map(b => `
        <div style="background:#000; padding:15px; border-radius:10px; border-left: 5px solid ${b.status==='pending'?'#888':'var(--green)'}; margin-bottom:12px;">
            <div style="font-size:0.8em; color:var(--gold);">${b.status === 'pending' ? '待審核' : '已核准'}</div>
            <strong>${b.game} - ${b.title}</strong><br>
            <div style="font-size:0.85em; color:#888; margin-top:5px;">${b.date} | ${b.start}-${b.end}</div>
            <div class="admin-member-grid">
                ${b.names ? b.names.map((n, i) => `<div style="font-size:0.8em; color:#bbb;">${i+1}. ${n}</div>`).join('') : '無名單'}
            </div>
            <div style="margin-top:10px; display:flex; gap:10px;">
                ${b.status === 'pending' ? `<button onclick="approveBooking('${b.id}')" style="background:var(--green); color:white; padding:5px 10px; border:none; border-radius:4px; cursor:pointer;">通過</button>` : ''}
                <button onclick="deleteBooking('${b.id}')" style="background:var(--red); color:white; padding:5px 10px; border:none; border-radius:4px; cursor:pointer;">刪除</button>
            </div>
        </div>
    `).join('');
});

function approveBooking(id) {
    db.ref('bookings/' + id).update({ status: 'success' });
}

function deleteBooking(id) {
    if(confirm("確定要刪除這筆預約紀錄嗎？")) {
        db.ref('bookings/' + id).remove();
    }
}
</script>
</body>
</html>
