<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>FF14 試算表管理後台</title>
    <style>
        :root { --gold: #d4af37; --bg: #111; --card: #222; }
        body { font-family: sans-serif; background: var(--bg); color: #eee; padding: 20px; text-align: center; }
        .box { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #444; max-width: 500px; margin: 0 auto 20px; }
        input, button { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #444; box-sizing: border-box; }
        button { background: var(--gold); color: #000; font-weight: bold; cursor: pointer; border: none; }
        .item { background: #000; padding: 10px; border-radius: 8px; margin-top: 8px; display: flex; justify-content: space-between; align-items: center; font-size: 13px; text-align: left; }
    </style>
</head>
<body>

<div class="box">
    <h2 style="color:var(--gold);">管理者工作台 (Google GAS 版)</h2>
    <div id="conn-status" style="font-size: 12px; color: #f1c40f;">乙太網路連線中...</div>
    <hr style="border: 0.5px solid #333; margin: 15px 0;">
    
    <label style="display:block; text-align:left; font-size:12px; color:#888;">發布新時段</label>
    <input type="date" id="opDate">
    <div style="display:flex; gap:10px;"><input type="time" id="opStart" value="18:00"><input type="time" id="opEnd" value="23:00"></div>
    <button id="addBtn" onclick="addOp()">確認發布</button>
</div>

<div class="box">
    <h3>預約審核中心</h3>
    <div id="bkList">讀取中...</div>
</div>

<div class="box">
    <h3>目前時段管理</h3>
    <div id="opList">讀取中...</div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwNCsVr993_vYwObLyu2ftHEkpP54CYFg72-K3PGG4Hyt4ibuEglsVWoSDJ5Op71fooeQ/exec";

async function fetchData() {
    try {
        const res = await fetch(API_URL);
        const data = await res.json();
        document.getElementById('conn-status').innerText = "🟢 Google 雲端同步中";
        render(data);
    } catch (e) { document.getElementById('conn-status').innerText = "🔴 連線中斷"; }
}

async function addOp() {
    const d = document.getElementById('opDate').value;
    if(!d) return alert("請選日期");
    
    const btn = document.getElementById('addBtn');
    btn.disabled = true; btn.innerText = "傳送中...";

    const payload = {
        action: "insert",
        data: {
            id: "slot_" + Date.now(),
            date: d,
            start: document.getElementById('opStart').value,
            end: document.getElementById('opEnd').value,
            type: "slot",
            status: "active",
            game: "-", title: "-", names: "-", max: "-"
        }
    };

    // GAS POST 請求優化版
    fetch(API_URL, {
        method: 'POST',
        mode: 'no-cors', // 解決瀏覽器攔截問題
        body: JSON.stringify(payload)
    }).then(() => {
        alert("✅ 時段發布成功！(資料入庫約有5秒延遲)");
        setTimeout(fetchData, 2000);
    }).finally(() => {
        btn.disabled = false; btn.innerText = "確認發布";
    });
}

function render(allData) {
    const slots = allData.filter(i => i.type === 'slot');
    const bookings = allData.filter(i => i.type === 'booking');

    document.getElementById('opList').innerHTML = slots.map(o => `
        <div class="item">
            <span>📅 ${o.date} (${o.start}-${o.end})</span>
            <button onclick="deleteRow('${o.id}')" style="width:auto; background:red; color:white; padding:4px 8px;">刪除</button>
        </div>`).join('') || "無時段";

    document.getElementById('bkList').innerHTML = bookings.map(b => `
        <div class="item" style="border-left:4px solid ${b.status==='pending'?'#888':'green'}">
            <div><strong>${b.game}</strong> [${b.status}]<br><small>${b.names}</small></div>
            <div>
                ${b.status==='pending'?`<button onclick="updateStatus('${b.id}','success')" style="width:auto; background:green; color:white; padding:4px 8px;">通過</button>`:''}
                <button onclick="deleteRow('${b.id}')" style="width:auto; background:#444; color:white; padding:4px 8px;">刪</button>
            </div>
        </div>`).join('') || "暫無申請";
}

// 刪除與更新功能 (發送 POST 到 GAS 處理)
function deleteRow(id) {
    if(!confirm("確定要刪除這筆資料嗎？")) return;
    fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: "delete", id: id }) })
    .then(() => setTimeout(fetchData, 1500));
}

function updateStatus(id, newStatus) {
    fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: "update", id: id, status: newStatus }) })
    .then(() => setTimeout(fetchData, 1500));
}

fetchData();
</script>
</body>
</html>
