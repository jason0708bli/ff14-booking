<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>FF14 試算表管理後台</title>
    <style>
        :root { --gold: #d4af37; --bg: #111; --card: #222; }
        body { font-family: sans-serif; background: var(--bg); color: #eee; padding: 20px; text-align: center; }
        .box { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #444; max-width: 500px; margin: 0 auto 20px; }
        input, button { width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 6px; }
        button { background: var(--gold); font-weight: bold; cursor: pointer; border: none; }
        .item { background: #000; padding: 10px; border-radius: 8px; margin-top: 8px; display: flex; justify-content: space-between; align-items: center; font-size: 13px; text-align: left; }
    </style>
</head>
<body>

<div class="box">
    <h2 style="color:var(--gold);">管理者工作台 (試算表版)</h2>
    <input type="date" id="opDate">
    <div style="display:flex; gap:10px;"><input type="time" id="opStart" value="18:00"><input type="time" id="opEnd" value="23:00"></div>
    <button onclick="addOp()">發布營業時段</button>
</div>

<div class="box">
    <h3>預約審核中</h3>
    <div id="bkList">讀取中...</div>
</div>

<div class="box">
    <h3>開放時段管理</h3>
    <div id="opList">讀取中...</div>
</div>

<script>
const API_URL = "https://sheetdb.io";
let allData = [];

async function fetchData() {
    const res = await fetch(API_URL);
    allData = await res.json();
    render();
}

async function addOp() {
    const d = document.getElementById('opDate').value;
    if(!d) return alert("選日期");
    const newSlot = { data: [{ id: "slot_"+Date.now(), date: d, start: document.getElementById('opStart').value, end: document.getElementById('opEnd').value, type: 'slot', status: 'active' }] };
    await fetch(API_URL, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(newSlot) });
    alert("時段已發布"); fetchData();
}

async function approve(id) {
    await fetch(`${API_URL}/id/${id}`, { method: 'PATCH', headers: {'Content-Type':'application/json'}, body: JSON.stringify({data: {status: 'success'}}) });
    fetchData();
}

async function del(id) {
    if(!confirm("確定刪除？")) return;
    await fetch(`${API_URL}/id/${id}`, { method: 'DELETE' });
    fetchData();
}

function render() {
    const slots = allData.filter(i => i.type === 'slot');
    const bookings = allData.filter(i => i.type === 'booking');

    document.getElementById('opList').innerHTML = slots.map(o => `
        <div class="item"><span>📅 ${o.date} (${o.start}-${o.end})</span><button onclick="del('${o.id}')" style="width:auto; background:red; color:white; padding:4px 8px;">刪除</button></div>
    `).join('') || "無時段";

    document.getElementById('bkList').innerHTML = bookings.map(b => `
        <div class="item" style="border-left:4px solid ${b.status==='pending'?'#888':'green'}">
            <div><strong>${b.game}</strong> [${b.status}]<br><small>${b.names}</small></div>
            <div>
                ${b.status==='pending'?`<button onclick="approve('${b.id}')" style="width:auto; background:green; color:white; padding:4px 8px;">通過</button>`:''}
                <button onclick="del('${b.id}')" style="width:auto; background:#444; color:white; padding:4px 8px;">刪</button>
            </div>
        </div>
    `).join('') || "無預約";
}

fetchData();
</script>
</body>
</html>
