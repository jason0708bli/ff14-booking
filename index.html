<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>FF14 桌遊預約看板 v15.9</title>
    <style>
        :root { --gold: #d4af37; --bg: #0f0f0f; --card: #1e1e1e; --text: #f0f0f0; --green: #2ecc71; --orange: #e67e22; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        body { font-family: "Microsoft JhengHei", sans-serif; background: #121212; color: var(--text); padding: 20px; margin: 0; }
        .date-selector { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 20px; border-bottom: 1px solid #333; }
        .date-tab { padding: 10px 20px; background: #252525; border-radius: 30px; cursor: pointer; border: 1px solid #444; white-space: nowrap; transition: 0.3s; }
        .date-tab.active { background: var(--gold); color: #000; font-weight: bold; border-color: var(--gold); }
        .slot-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        .open-slot-btn { border: 2px dashed var(--gold); padding: 15px; text-align: center; border-radius: 10px; background: rgba(212, 175, 55, 0.05); cursor: pointer; transition: 0.3s; }
        .open-slot-btn:hover { background: rgba(212, 175, 55, 0.15); transform: translateY(-3px); }
        .booking-card { background: #252525; border-left: 6px solid #666; padding: 18px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #333; position: relative; animation: fadeIn 0.5s; }
        .booking-card.success { border-left-color: var(--green); }
        .progress-container { background: #111; border-radius: 10px; height: 6px; width: 100%; margin: 10px 0; border: 1px solid #333; }
        .progress-bar { height: 100%; background: var(--gold); transition: width 0.5s; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .modal { background: #1a1a1a; width: 450px; padding: 25px; border-radius: 20px; border: 1px solid var(--gold); max-height: 90vh; overflow-y: auto; }
        input, select, button { width: 100%; padding: 10px; border-radius: 6px; margin-bottom: 10px; background: #111; color: #fff; border: 1px solid #444; box-sizing: border-box; }
        button.primary { background: linear-gradient(90deg, #d4af37, #f1c40f, #d4af37); color: #000; font-weight: bold; cursor: pointer; border: none; }
        .p-row { display: flex; gap: 5px; margin-bottom: 5px; }
        .s-v { width: 110px !important; flex-shrink: 0; }
        .join-btn { background: var(--green); color: white; width: auto; padding: 6px 15px; border: none; cursor: pointer; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>

<div id="conn-hint" style="font-size: 10px; text-align: right; color: #555;">📡 正在連線乙太網路...</div>
<h2>FF14 桌遊預約看板</h2>
<div id="dateSelector" class="date-selector"></div>
<div id="operatingBoard" class="slot-grid"></div>

<h3 style="margin-top:40px; border-bottom: 1px solid #333; padding-bottom: 10px;">預約即時動態</h3>
<div id="bookingList">載入中...</div>

<div id="bookingModal" class="overlay">
    <div class="modal">
        <h3 style="color:var(--gold); margin-top:0;">發起預約申請</h3>
        <select id="userGame" onchange="toggleMax()">
            <option value="阿瓦隆" data-max="10">阿瓦隆 (10人)</option>
            <option value="TRPG" data-max="4">TRPG (4人)</option>
            <option value="自選桌遊" data-max="6">自選桌遊 (6人)</option>
        </select>
        <input type="text" id="userTitle" placeholder="本局標題">
        <div style="display:flex; gap:10px;"><select id="userStartSelect"></select>至<select id="userEndSelect"></select></div>
        <select id="userJoinMode"><option value="true">🟢 開放併桌</option><option value="false">🔒 私人團</option></select>
        <label style="font-size: 0.7em; color: #888;">人數</label><select id="pCount" onchange="genInputs()"></select>
        <div id="nameFields"></div>
        <button id="submitBtn" class="primary" onclick="confirmBooking()">送出申請</button>
        <button onclick="document.getElementById('bookingModal').style.display='none'" style="background:#444; border:none; color:white;">關閉</button>
    </div>
</div>

<div id="joinModal" class="overlay">
    <div class="modal">
        <h3>我要併桌加入</h3>
        <p id="joinInfo" style="font-size: 0.9em; color:#888;"></p>
        <div id="joinFields"></div>
        <button id="joinConfirmBtn" class="primary" style="background:var(--green); color:white;" onclick="confirmJoin()">確定加入</button>
        <button onclick="document.getElementById('joinModal').style.display='none'" style="background:#444; border:none; color:white;">取消</button>
    </div>
</div>

<script>
    // 【強制修正】前台網址同樣寫死，解決 ERR_NAME_NOT_RESOLVED
    const READ_URL = "https://docs.google.com/spreadsheets/d/1tef_7gaTP8q7O4xoDvxfw_bpvi179GE4zxD-_NX3wWY/edit?usp=sharing";
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwNCsVr993_vYwObLyu2ftHEkpP54CYFg72-K3PGG4Hyt4ibuEglsVWoSDJ5Op71fooeQ/exec";
    const SERVERS = ["伊弗利特", "利維坦", "迦樓羅", "鳳凰", "奧汀", "泰坦"];

    let allData = [], currentViewDate = null, activeOp = null, targetBk = null;

    async function fetchData() {
        try {
            const res = await fetch(READ_URL);
            const text = await res.text();
            const jsonText = text.substring(text.indexOf("(") + 1, text.lastIndexOf(")"));
            const json = JSON.parse(jsonText);
            allData = json.table.rows.map(r => ({
                id: r.c[0]?.v || "", date: r.c[1]?.v || "", start: r.c[2]?.f || r.c[2]?.v || "", end: r.c[3]?.f || r.c[3]?.v || "",
                game: r.c[4]?.v || "", title: r.c[5]?.v || "", names: r.c[6]?.v || "", status: r.c[7]?.v || "", type: r.c[8]?.v || "", max: r.c[9]?.v || 0
            }));
            document.getElementById('conn-hint').innerText = "🟢 乙太網路已連線";
            render();
        } catch (e) { console.error("讀取失敗", e); }
    }

    function render() {
        const slots = allData.filter(i => i.type === 'slot');
        const bks = allData.filter(i => i.type === 'booking');
        const dates = [...new Set(slots.map(o => o.date))].sort();
        if(!currentViewDate && dates.length > 0) currentViewDate = dates;

        document.getElementById('dateSelector').innerHTML = dates.map(d => `<div class="date-tab ${currentViewDate===d?'active':''}" onclick="currentViewDate='${d}'; render();">${d}</div>`).join('');
        document.getElementById('operatingBoard').innerHTML = slots.filter(o => o.date === currentViewDate).map(o => `<div class="open-slot-btn" onclick="openBooking('${o.id}')">${o.start} - ${o.end}</div>`).join('') || "今日無開放";
        
        document.getElementById('bookingList').innerHTML = bks.filter(b => b.date === currentViewDate && b.status !== 'fail').map(b => {
            const nameList = b.names ? b.names.split(', ') : [];
            const isPrivate = b.names && b.names.includes("[私人]");
            const currentCount = nameList.length;
            const percent = (currentCount / (b.max || 1)) * 100;
            return `
            <div class="booking-card ${b.status}">
                <span style="float:right; font-size:10px;">${b.status==='pending'?'[審核中]':'[✅已通過]'}</span>
                <strong>${b.title}</strong> (${b.game})
                <div class="progress-container"><div class="progress-bar" style="width:${percent}%"></div></div>
                <small>🕒 ${b.start}-${b.end} | 👥 ${currentCount}/${b.max}人</small><br>
                <div style="margin-top:8px; font-size:0.8em; color:#bbb;">${b.names}</div>
                ${(b.status === 'success' && currentCount < b.max && !isPrivate) ? `<button class="join-btn" onclick="openJoin('${b.id}')">我要併桌</button>` : ''}
            </div>`;
        }).join('') || "尚無預約紀錄";
    }

    function openBooking(id) {
        activeOp = allData.find(i => i.id === id);
        const generateTimes = (s, e) => {
            let h = "", c = new Date("2024-01-01T" + s), stop = new Date("2024-01-01T" + e);
            while(c <= stop) { h += '<option>' + c.toTimeString().substring(0, 5) + '</option>'; c.setMinutes(c.getMinutes() + 30); }
            return h;
        };
        document.getElementById('userStartSelect').innerHTML = generateTimes(activeOp.start, activeOp.end);
        document.getElementById('userEndSelect').innerHTML = generateTimes(activeOp.start, activeOp.end);
        document.getElementById('bookingModal').style.display = 'flex';
        toggleMax();
    }

    function openJoin(id) {
        targetBk = allData.find(i => i.id === id);
        const sOpts = SERVERS.map(s => `<option value="${s}">${s}</option>`).join('');
        document.getElementById('joinFields').innerHTML = `<div class="p-row" style="display:flex; gap:5px;"><select id="jServer">${sOpts}</select><input type="text" id="jName" placeholder="名字"></div>`;
        document.getElementById('joinModal').style.display = 'flex';
    }

    async function confirmJoin() {
        const n = document.getElementById('jName').value.trim(); if(!n) return alert("請填名");
        const newNames = targetBk.names + ", " + document.getElementById('jServer').value + "@" + n;
        fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: "update_names", id: targetBk.id, names: newNames }) }).then(() => { alert("申請成功！"); document.getElementById('joinModal').style.display = 'none'; setTimeout(fetchData, 2000); });
    }

    async function confirmBooking() {
        const names = []; document.querySelectorAll('.p-row').forEach(g => {
            const nv = g.querySelector('.n-v').value.trim(); if(nv) names.push(`${g.querySelector('.s-v').value}@${nv}`);
        });
        if(names.length === 0) return alert("請填名");
        const namesStr = (document.getElementById('userJoinMode').value === "false" ? "[私人] " : "") + names.join(", ");
        const payload = { action: "insert", data: { id: "bk_" + Date.now(), date: activeOp.date, start: document.getElementById('userStartSelect').value, end: document.getElementById('userEndSelect').value, game: document.getElementById('userGame').value, title: document.getElementById('userTitle').value || "未命名", names: namesStr, status: "pending", type: "booking", max: document.getElementById('userGame').selectedOptions.dataset.max } };
        fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) }).then(() => { alert("申請已送出！"); document.getElementById('bookingModal').style.display = 'none'; setTimeout(fetchData, 2000); });
    }

    function toggleMax() {
        const max = document.getElementById('userGame').selectedOptions.dataset.max;
        let h = ""; for(let i=1; i<=max; i++) h += `<option value="${i}">${i}人</option>`;
        document.getElementById('pCount').innerHTML = h; genInputs();
    }
    function genInputs() {
        const count = document.getElementById('pCount').value, div = document.getElementById('nameFields'); div.innerHTML = "";
        const sOpts = SERVERS.map(s => `<option value="${s}">${s}</option>`).join('');
        for(let i=0; i<count; i++) div.innerHTML += `<div class="p-row"><select class="s-v">${sOpts}</select><input type="text" class="n-v" placeholder="名字"></div>`;
    }
    fetchData();
</script>
</body>
</html>
