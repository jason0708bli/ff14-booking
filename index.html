<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>FF14 桌遊預約看板 v14.0</title>
    <style>
        :root { --gold: #d4af37; --bg: #0f0f0f; --card: #1e1e1e; --text: #f0f0f0; --green: #2ecc71; --orange: #e67e22; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: #121212; color: var(--text); padding: 20px; }
        .date-tab { padding: 10px 20px; background: #252525; border-radius: 30px; cursor: pointer; border: 1px solid #444; margin-right: 10px; display: inline-block; transition: 0.3s; }
        .date-tab.active { background: var(--gold); color: #000; font-weight: bold; border-color: var(--gold); }
        .slot-btn { border: 2px dashed var(--gold); padding: 15px; text-align: center; border-radius: 10px; cursor: pointer; margin-top: 10px; display: inline-block; min-width: 140px; background: rgba(212,175,55,0.05); transition: 0.3s; }
        .booking-card { background: #252525; border-left: 6px solid #666; padding: 18px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #333; position: relative; }
        .booking-card.success { border-left-color: var(--green); }
        .mode-badge { position: absolute; top: 10px; right: 10px; padding: 3px 8px; border-radius: 4px; font-size: 0.7em; font-weight: bold; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .modal { background: #1a1a1a; width: 450px; padding: 25px; border-radius: 20px; border: 1px solid var(--gold); max-height: 90vh; overflow-y: auto; }
        input, select, button { width: 100%; padding: 10px; border-radius: 6px; margin-bottom: 10px; background: #111; color: #fff; border: 1px solid #444; box-sizing: border-box; }
        button.primary { background: var(--gold); color: #000; font-weight: bold; cursor: pointer; border: none; }
        .p-row { display: flex; gap: 5px; margin-bottom: 5px; }
        .s-v { width: 110px !important; flex-shrink: 0; }
        .join-btn { background: var(--green); color: white; width: auto; padding: 6px 15px; margin-top: 10px; border: none; cursor: pointer; border-radius: 4px; }
    </style>
</head>
<body>

<div style="font-size: 10px; text-align: right; color: #555;">📡 雲端通訊正常</div>
<h2>FF14 桌遊預約看板</h2>
<div id="dateSelector" style="margin-bottom: 20px; overflow-x: auto; white-space: nowrap;"></div>
<div id="operatingBoard">正在讀取最新時段...</div>

<h3 style="margin-top:40px; border-bottom: 1px solid #333; padding-bottom: 10px;">預約動態</h3>
<div id="bookingList">載入中...</div>

<!-- 預約視窗 -->
<div id="bookingModal" class="overlay">
    <div class="modal">
        <h3 style="color:var(--gold); margin-top:0;">發起預約申請</h3>
        <select id="userGame" onchange="toggleMax()">
            <option value="阿瓦隆" data-max="10">阿瓦隆 (上限 10 人)</option>
            <option value="TRPG" data-max="4">TRPG 劇本團 (上限 4 人)</option>
            <option value="自選桌遊" data-max="6">自選桌遊 (上限 6 人)</option>
        </select>
        <input type="text" id="userTitle" placeholder="本局標題 (如：推廣團)">
        <div style="display:flex; gap:10px;"><select id="userStartSelect"></select>至<select id="userEndSelect"></select></div>
        
        <label style="font-size: 0.8em; color: #888;">預約模式</label>
        <select id="userJoinMode">
            <option value="true">🟢 開放併桌 (歡迎散客加入)</option>
            <option value="false">🔒 私人團 (親友包場)</option>
        </select>

        <label style="font-size: 0.8em; color: #888;">起始人數</label>
        <select id="pCount" onchange="genInputs()"></select>
        <div id="nameFields"></div>
        <button id="submitBtn" class="primary" onclick="confirmBooking()">送出申請</button>
        <button onclick="document.getElementById('bookingModal').style.display='none'" style="background:#444; border:none;">取消</button>
    </div>
</div>

<!-- 併桌加入視窗 -->
<div id="joinModal" class="overlay">
    <div class="modal">
        <h3 style="color:var(--green); margin-top:0;">加入併桌</h3>
        <p id="joinInfo" style="font-size: 0.9em; color:#bbb;"></p>
        <div id="joinFields">
             <div class="p-row">
                <select class="s-v-j" id="joinServer"></select>
                <input type="text" id="joinName" placeholder="請輸入名字">
             </div>
        </div>
        <button id="joinConfirmBtn" class="primary" style="background:var(--green); color:white;" onclick="confirmJoin()">確定加入</button>
        <button onclick="document.getElementById('joinModal').style.display='none'" style="background:#444; border:none;">取消</button>
    </div>
</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbwNCsVr993_vYwObLyu2ftHEkpP54CYFg72-K3PGG4Hyt4ibuEglsVWoSDJ5Op71fooeQ/exec";
const SERVERS = ["伊弗利特", "利維坦", "迦樓羅", "鳳凰", "奧汀", "泰坦"];
let allData = [], currentViewDate = null, activeOp = null, targetBk = null;

async function fetchData() {
    try {
        const res = await fetch(GAS_URL);
        allData = await res.json();
        render();
    } catch (e) { console.error("讀取失敗"); }
}

function render() {
    const slots = allData.filter(i => i.type === 'slot');
    const bks = allData.filter(i => i.type === 'booking');
    const dates = [...new Set(slots.map(o => o.date))].sort();
    if(!currentViewDate && dates.length > 0) currentViewDate = dates[0];

    document.getElementById('dateSelector').innerHTML = dates.map(d => `<div class="date-tab ${currentViewDate===d?'active':''}" onclick="currentViewDate='${d}'; render();">${d}</div>`).join('');
    document.getElementById('operatingBoard').innerHTML = slots.filter(o => o.date === currentViewDate).map(o => `<div class="slot-btn" onclick="openBooking('${o.id}')">${o.start} - ${o.end}</div>`).join('') || "今日無開放";
    
    document.getElementById('bookingList').innerHTML = bks.filter(b => b.date === currentViewDate && b.status !== 'fail').map(b => {
        const namesCount = b.names ? b.names.split(', ').length : 0;
        const isFull = namesCount >= parseInt(b.max);
        const allowJoin = String(b.title).includes("(私人)") ? false : (b.status === 'success' && !isFull);
        
        return `
        <div class="booking-card ${b.status}">
            <div class="mode-badge" style="background:${b.names.includes('私人') ? 'var(--orange)' : 'var(--green)'}">
                ${b.names.includes('私人') ? '🔒私人' : '🟢併桌'}
            </div>
            <span style="float:right; font-size:10px; margin-right:40px;">${b.status==='pending'?'[審核中]':'[✅已核准]'}</span>
            <strong>${b.title}</strong> (${b.game})<br>
            <small>🕒 ${b.start}-${b.end} | 👥 ${namesCount}/${b.max}</small>
            <div style="margin-top:8px;">${b.names}</div>
            ${(b.status === 'success' && !isFull && !b.names.includes('私人')) ? `<button class="join-btn" onclick="openJoin('${b.id}')">我要併桌</button>` : ''}
        </div>`;
    }).join('') || "尚無預約";
}

function openBooking(id) {
    activeOp = allData.find(i => i.id === id);
    const generateTimes = (s, e) => {
        let h = "", c = new Date(`2024-01-01T${s}`), stop = new Date(`2024-01-01T${e}`);
        while(c <= stop) { h += `<option>${c.toTimeString().substring(0, 5)}</option>`; c.setMinutes(c.getMinutes() + 30); }
        return h;
    };
    document.getElementById('userStartSelect').innerHTML = generateTimes(activeOp.start, activeOp.end);
    document.getElementById('userEndSelect').innerHTML = generateTimes(activeOp.start, activeOp.end);
    document.getElementById('bookingModal').style.display = 'flex';
    toggleMax();
}

function openJoin(id) {
    targetBk = allData.find(i => i.id === id);
    document.getElementById('joinInfo').innerText = `加入：${targetBk.title} (${targetBk.game})`;
    const sOpts = SERVERS.map(s => `<option value="${s}">${s}</option>`).join('');
    document.getElementById('joinServer').innerHTML = sOpts;
    document.getElementById('joinModal').style.display = 'flex';
}

async function confirmJoin() {
    const s = document.getElementById('joinServer').value;
    const n = document.getElementById('joinName').value.trim();
    if(!n) return alert("請輸入名字");
    
    const btn = document.getElementById('joinConfirmBtn');
    btn.disabled = true; btn.innerText = "寫入中...";

    const newNames = targetBk.names + ", " + s + "@" + n;
    
    await fetch(GAS_URL, {
        method: 'POST',
        mode: 'no-cors',
        body: JSON.stringify({ action: "update_names", id: targetBk.id, names: newNames })
    });

    alert("✅ 併桌成功！");
    document.getElementById('joinModal').style.display = 'none';
    setTimeout(fetchData, 2000);
    btn.disabled = false; btn.innerText = "確定加入";
}

async function confirmBooking() {
    const names = []; 
    document.querySelectorAll('.p-row').forEach(g => {
        const nv = g.querySelector('.n-v').value.trim();
        if(nv) names.push(`${g.querySelector('.s-v').value}@${nv}`);
    });
    if(names.length === 0) return alert("請填寫名字");

    const isPrivate = document.getElementById('userJoinMode').value === "false";
    const namesStr = (isPrivate ? "[私人] " : "") + names.join(", ");

    const payload = {
        action: "insert",
        data: {
            id: "bk_" + Date.now(), date: activeOp.date,
            start: document.getElementById('userStartSelect').value,
            end: document.getElementById('userEndSelect').value,
            game: document.getElementById('userGame').value,
            title: document.getElementById('userTitle').value || "未命名",
            names: namesStr, status: "pending", type: "booking",
            max: document.getElementById('userGame').selectedOptions[0].dataset.max
        }
    };

    fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) })
    .then(() => {
        alert("✅ 預約申請已送出！");
        document.getElementById('bookingModal').style.display = 'none';
        setTimeout(fetchData, 2000);
    });
}

function toggleMax() {
    const max = document.getElementById('userGame').selectedOptions[0].dataset.max;
    let h = ""; for(let i=1; i<=max; i++) h += `<option value="${i}">${i}人</option>`;
    document.getElementById('pCount').innerHTML = h; genInputs();
}
function genInputs() {
    const count = document.getElementById('pCount').value, div = document.getElementById('nameFields'); div.innerHTML = "";
    const sOpts = SERVERS.map(s => `<option value="${s}">${s}</option>`).join('');
    for(let i=0; i<count; i++) div.innerHTML += `<div class="p-row"><select class="s-v">${sOpts}</select><input type="text" class="n-v" placeholder="名字"></div>`;
}

fetchData();
</script>
</body>
</html>
