<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>FF14 桌遊預約看板</title>
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <style>
        :root { --gold: #d4af37; --bg: #0f0f0f; --card: #1e1e1e; --text: #f0f0f0; --green: #2ecc71; }
        body { font-family: sans-serif; background: #121212; color: var(--text); padding: 20px; }
        .date-tab { padding: 10px 20px; background: #252525; border-radius: 30px; cursor: pointer; border: 1px solid #444; margin-right: 10px; display: inline-block; }
        .date-tab.active { background: var(--gold); color: #000; font-weight: bold; }
        .slot-btn { border: 2px dashed var(--gold); padding: 15px; text-align: center; border-radius: 10px; cursor: pointer; margin-top: 10px; display: inline-block; min-width: 120px; }
        .card { background: #252525; border-left: 6px solid #666; padding: 15px; margin-bottom: 10px; border-radius: 8px; }
        .card.success { border-left-color: var(--green); }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; }
        .modal { background: #1a1a1a; width: 400px; padding: 30px; border-radius: 20px; border: 1px solid var(--gold); }
        input, select, button { width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 5px; }
        button.primary { background: var(--gold); font-weight: bold; cursor: pointer; border: none; }
    </style>
</head>
<body>

<div id="conn-state" style="font-size: 10px; text-align: right; color: #444;">📡 連線中...</div>
<h2>FF14 桌遊預約看板</h2>
<div id="dateSelector"></div>
<div id="operatingBoard"></div>
<h3 style="margin-top:30px;">已排定的局</h3>
<div id="bookingList">載入中...</div>

<div id="bookingModal" class="overlay">
    <div class="modal">
        <h3>發起預約申請</h3>
        <select id="userGame">
            <option value="阿瓦隆" data-max="10">阿瓦隆 (10人)</option>
            <option value="TRPG" data-max="4">TRPG (4人)</option>
            <option value="自選桌遊" data-max="6">自選桌遊 (6人)</option>
        </select>
        <input type="text" id="userTitle" placeholder="本局標題">
        <div style="display:flex; gap:10px;"><select id="userStartSelect"></select>至<select id="userEndSelect"></select></div>
        <input type="text" id="userName" placeholder="玩家名字 (格式: 伺服器 @ 名字)">
        <button class="primary" onclick="confirmBooking()">送出申請</button>
        <button onclick="document.getElementById('bookingModal').style.display='none'" style="background:#444; color:white;">關閉</button>
    </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDlfxbnfyGu7Uhgp2ULZukcOwrPve5IYuY",
  authDomain: "ff14-boardgame.firebaseapp.com",
  databaseURL: "https://ff14-boardgame-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "ff14-boardgame",
  appId: "1:1065149131631:web:89281ad9cc8f76172c969a"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let opSlots = [], bookings = [], currentViewDate = null;
let activeOp = null;

db.ref(".info/connected").on("value", (snap) => {
    document.getElementById('conn-state').innerText = snap.val() ? "🟢 雲端同步中" : "🔴 離線中";
});

db.ref('opSlots').on('value', snap => { opSlots = snap.val() ? Object.values(snap.val()) : []; render(); });
db.ref('bookings').on('value', snap => { bookings = snap.val() ? Object.values(snap.val()) : []; render(); });

function render() {
    const allDates = [...new Set(opSlots.map(o => o.date))].sort();
    if(!currentViewDate && allDates.length > 0) currentViewDate = allDates[0];
    document.getElementById('dateSelector').innerHTML = allDates.map(d => `<div class="date-tab ${currentViewDate===d?'active':''}" onclick="currentViewDate='${d}'; render();">${d}</div>`).join('');
    document.getElementById('operatingBoard').innerHTML = opSlots.filter(o => o.date === currentViewDate).map(o => `<div class="slot-btn" onclick="openBooking(${o.id})">${o.start}-${o.end}</div>`).join('');
    document.getElementById('bookingList').innerHTML = bookings.filter(b => b.date === currentViewDate && b.status !== 'fail').map(b => `
        <div class="card ${b.status}">
            <strong>${b.title}</strong> (${b.game})<br>
            <small>${b.start}-${b.end} | [${b.status==='pending'?'審核中':'預約成功'}]</small>
        </div>`).join('') || '尚無預約';
}

function openBooking(id) {
    activeOp = opSlots.find(x => x.id === id);
    const generateTimes = (s, e) => {
        let h = "", c = new Date(`2024-01-01T${s}`), stop = new Date(`2024-01-01T${e}`);
        while(c <= stop) { h += `<option>${c.toTimeString().substring(0, 5)}</option>`; c.setMinutes(c.getMinutes() + 30); }
        return h;
    };
    document.getElementById('userStartSelect').innerHTML = generateTimes(activeOp.start, activeOp.end);
    document.getElementById('userEndSelect').innerHTML = generateTimes(activeOp.start, activeOp.end);
    document.getElementById('bookingModal').style.display = 'flex';
}

function confirmBooking() {
    const id = Date.now();
    db.ref('bookings/' + id).set({
        id, opId: activeOp.id, date: activeOp.date,
        title: document.getElementById('userTitle').value || "未命名",
        game: document.getElementById('userGame').value,
        start: document.getElementById('userStartSelect').value,
        end: document.getElementById('userEndSelect').value,
        names: [document.getElementById('userName').value || "未知玩家"],
        status: 'pending'
    }).then(() => { document.getElementById('bookingModal').style.display = 'none'; alert("已送出申請！"); });
}
</script>
</body>
</html>
