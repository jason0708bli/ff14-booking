<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>FF14 桌遊預約看板</title>
    <style>
        :root { --gold: #d4af37; --bg: #0f0f0f; --card: #1e1e1e; --text: #f0f0f0; --green: #2ecc71; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        body { font-family: "Microsoft JhengHei", sans-serif; background: #121212; color: var(--text); padding: 20px; }
        .date-tab { padding: 10px 20px; background: #252525; border-radius: 30px; cursor: pointer; border: 1px solid #444; margin-right: 10px; display: inline-block; }
        .date-tab.active { background: var(--gold); color: #000; font-weight: bold; }
        .slot-btn { border: 2px dashed var(--gold); padding: 15px; text-align: center; border-radius: 10px; cursor: pointer; margin-top: 10px; display: inline-block; min-width: 140px; background: rgba(212,175,55,0.05); }
        .card { background: #252525; border-left: 6px solid #666; padding: 15px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #333; animation: fadeIn 0.5s; }
        .card.success { border-left-color: var(--green); }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .modal { background: #1a1a1a; width: 400px; padding: 25px; border-radius: 20px; border: 1px solid var(--gold); }
        input, select, button { width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 6px; background: #111; color: #fff; border: 1px solid #444; }
        button.primary { background: var(--gold); color: #000; font-weight: bold; cursor: pointer; border: none; }
    </style>
</head>
<body>

<div style="font-size: 10px; text-align: right; color: #444;">📡 Google 雲端乙太網路連線中</div>
<h2>FF14 桌遊預約看板</h2>
<div id="dateSelector"></div>
<div id="operatingBoard">正在抓取雲端時段...</div>

<h3 style="margin-top:40px; border-bottom: 1px solid #333; padding-bottom: 10px;">已排定的局</h3>
<div id="bookingList">載入中...</div>

<div id="bookingModal" class="overlay">
    <div class="modal">
        <h3>發起預約申請</h3>
        <select id="userGame" onchange="toggleMax()">
            <option value="阿瓦隆" data-max="10">阿瓦隆 (10人)</option>
            <option value="TRPG" data-max="4">TRPG (4人)</option>
            <option value="自選桌遊" data-max="6">自選桌遊 (6人)</option>
        </select>
        <input type="text" id="userTitle" placeholder="本局標題">
        <div style="display:flex; gap:10px;"><select id="userStartSelect"></select>至<select id="userEndSelect"></select></div>
        <label>人數</label><select id="pCount" onchange="genInputs()"></select>
        <div id="nameFields" style="max-height:150px; overflow-y:auto; margin-bottom:10px;"></div>
        <button id="submitBtn" class="primary" onclick="confirmBooking()">送出申請</button>
        <button onclick="document.getElementById('bookingModal').style.display='none'" style="background:#444;">取消</button>
    </div>
</div>

<script>
const API_URL = "https://sheetdb.io";
const SERVERS = ["伊弗利特", "利維坦", "迦樓羅", "鳳凰", "奧汀", "泰坦"];
let allData = [], currentViewDate = null, activeOp = null;

async function fetchData() {
    try {
        const res = await fetch(API_URL);
        allData = await res.json();
        render();
    } catch (e) { console.error("連線失敗"); }
}

function render() {
    const opSlots = allData.filter(i => i.type === 'slot');
    const bookings = allData.filter(i => i.type === 'booking');
    
    const dates = [...new Set(opSlots.map(o => o.date))].sort();
    if(!currentViewDate && dates.length > 0) currentViewDate = dates[0];

    document.getElementById('dateSelector').innerHTML = dates.map(d => `<div class="date-tab ${currentViewDate===d?'active':''}" onclick="currentViewDate='${d}'; render();">${d}</div>`).join('');
    document.getElementById('operatingBoard').innerHTML = opSlots.filter(o => o.date === currentViewDate).map(o => `<div class="slot-btn" onclick="openBooking('${o.id}')">${o.start}-${o.end}</div>`).join('') || "今日無時段";
    document.getElementById('bookingList').innerHTML = bookings.filter(b => b.date === currentViewDate && b.status !== 'fail').map(b => `
        <div class="card ${b.status}">
            <span style="float:right; font-size:10px;">${b.status==='pending'?'[審核中]':'[✅已核准]'}</span>
            <strong>${b.title}</strong> (${b.game})<br>
            <small>${b.start}-${b.end} | ${b.names}</small>
        </div>`).join('') || "尚無預約";
}

function openBooking(id) {
    activeOp = allData.find(i => i.id === id);
    const generateTimes = (s, e) => {
        let h = "", c = new Date(`2024-01-01T${s}`), stop = new Date(`2024-01-01T${e}`);
        while(c <= stop) { h += `<option>${c.toTimeString().substring(0, 5)}</option>`; c.setMinutes(c.getMinutes() + 30); }
        return h;
    };
    document.getElementById('userStartSelect').innerHTML = generateTimes(activeOp.start, activeOp.end);
    document.getElementById('userEndSelect').innerHTML = generateTimes(activeOp.start, activeOp.end);
    document.getElementById('bookingModal').style.display = 'flex';
    toggleMax();
}

async function confirmBooking() {
    const names = []; 
    document.querySelectorAll('.b-p').forEach(g => {
        const nv = g.querySelector('.n-v').value.trim();
        if(nv) names.push(`${g.querySelector('.s-v').value}@${nv}`);
    });
    if(names.length === 0) return alert("請填寫名字");

    const btn = document.getElementById('submitBtn');
    btn.disabled = true; btn.innerText = "傳送中...";

    const newBk = {
        data: [{
            id: "bk_" + Date.now(),
            date: activeOp.date,
            start: document.getElementById('userStartSelect').value,
            end: document.getElementById('userEndSelect').value,
            game: document.getElementById('userGame').value,
            title: document.getElementById('userTitle').value || "未命名",
            names: names.join(", "),
            status: 'pending',
            type: 'booking',
            max: document.getElementById('userGame').selectedOptions[0].dataset.max
        }]
    };

    await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(newBk)
    });

    document.getElementById('bookingModal').style.display = 'none';
    alert("預約成功！請等待審核。");
    fetchData();
}

function toggleMax() {
    const max = document.getElementById('userGame').selectedOptions[0].dataset.max;
    let h = ""; for(let i=1; i<=max; i++) h += `<option value="${i}">${i}人</option>`;
    document.getElementById('pCount').innerHTML = h; genInputs();
}
function genInputs() {
    const count = document.getElementById('pCount').value, div = document.getElementById('nameFields'); div.innerHTML = "";
    const sOpts = SERVERS.map(s => `<option value="${s}">${s}</option>`).join('');
    for(let i=0; i<count; i++) div.innerHTML += `<div class="b-p" style="display:flex; gap:5px; margin-bottom:5px;"><select class="s-v">${sOpts}</select><input type="text" class="n-v" placeholder="ID"></div>`;
}

fetchData();
</script>
</body>
</html>
