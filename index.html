<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>冒險者公會招募版 v19.0</title>
    <style>
        /* 中世紀風格字體 (Blackletter / Uncial 風格) */
        @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=IM+Fell+English+SC&family=Noto+Serif+TC:wght@500&display=swap');

        :root { 
            --wood-dark: #2c1a0b; /* 暗木色 */
            --paper-bg: #fdf3e3; /* 羊皮紙底色 */
            --paper-border: #d2b48c; /* 羊皮紙邊框 */
            --tan-leather: #a0522d; /* 皮革棕 */
            --gold-old: #b8860b; /* 暗金色 */
            --text-dark: #3e2723; /* 深褐文字 */
            --green-old: #2d5a27; /* 復古綠 */
            --red-old: #8b0000; /* 焦紅 (私人團用) */
        }

        body { 
            /* 背景：木紋質感 (使用簡單的紋理重複) */
            background-color: var(--wood-dark);
            background-image: url('https://www.transparenttextures.com/patterns/dark-wood.png'); 
            color: var(--text-dark); 
            padding: 30px; 
            margin: 0; 
            font-family: 'Noto Serif TC', serif; /* 中文手寫感字體 */
        }

        /* 主標題美化 - 使用 Cinzel Decorative 風格 */
        h2 { 
            font-family: 'Cinzel Decorative', cursive;
            color: var(--gold-old);
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 3px;
            filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.5));
            border-bottom: 2px solid var(--tan-leather);
            padding-bottom: 15px;
            margin-bottom: 30px;
        }

        /* 頂部提示框 - 改為皮革手卷感 */
        #toast {
            display: none; position: fixed; top: 30px; left: 50%; transform: translateX(-50%);
            background: var(--tan-leather); color: #fff; 
            border: 2px solid var(--wood-dark);
            padding: 15px 40px; border-radius: 4px; z-index: 9999; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.8); animation: slideIn 0.4s ease;
            font-weight: bold;
        }

        /* 日期選擇器 - 改為木牌感 */
        .date-tab { 
            padding: 12px 25px; background: #5d4037; /* 褐色 */
            border-radius: 4px; border: 2px solid #3e2723; margin-right: 12px; 
            display: inline-block; color: #d7ccc8; transition: all 0.2s ease;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }
        .date-tab.active { 
            background: var(--tan-leather); color: white; font-weight: bold; 
            border-color: var(--gold-old); box-shadow: 0 0 10px rgba(184,134,11,0.6);
            transform: translateY(1px);
        }

        /* 時段按鈕 - 粗糙金屬框 */
        .slot-btn { 
            border: 3px solid #795548; background: #3e2723; color: #d7ccc8;
            padding: 15px; text-align: center; border-radius: 4px; 
            margin-top: 10px; display: inline-block; min-width: 140px; 
            font-family: 'IM Fell English SC', serif;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.5);
            transition: all 0.2s ease;
        }
        .slot-btn:hover { background: #5d4037; border-color: var(--gold-old); color: white; }

        /* 預約卡片 - 關鍵：羊皮紙質感 */
        .booking-card { 
            background-color: var(--paper-bg);
            background-image: url('https://www.transparenttextures.com/patterns/dark-dotted-2.png'); /* 增加粗糙感 */
            border: 2px solid var(--paper-border); 
            padding: 25px; margin-bottom: 25px; border-radius: 2px;
            position: relative; transition: transform 0.2s ease;
            box-shadow: 3px 3px 10px rgba(0,0,0,0.3); /* 像紙張釘上的感覺 */
            overflow: hidden;
        }
        
        /* 羊皮紙的捲曲角落效果 (選配，增加質感) */
        .booking-card::before {
            content: ""; position: absolute; bottom: 0; right: 0;
            width: 0; height: 0;
            border-style: solid; border-width: 0 0 20px 20px;
            border-color: transparent transparent rgba(0,0,0,0.1) transparent;
        }

        /* 狀態標籤 - 封蠟感 */
        .mode-badge { 
            border-radius: 50px; padding: 4px 10px; font-size: 11px; font-weight: bold; 
            position:absolute; top:15px; right:15px; text-transform: uppercase;
            box-shadow: 1px 1px 3px rgba(0,0,0,0.3);
            border: 1px solid rgba(0,0,0,0.2);
        }

        /* 進度條 - 皮革質感 */
        .progress-container { background: rgba(0,0,0,0.15); border-radius: 2px; height: 6px; margin: 15px 0; border: 1px solid rgba(0,0,0,0.1); }
        .progress-bar { background: var(--tan-leather); box-shadow: inset 0 0 5px rgba(0,0,0,0.3); }

        /* 彈窗：重皮革手卷感 */
        .modal { 
            background: var(--paper-bg); border: 4px solid var(--tan-leather); 
            box-shadow: 0 10px 40px rgba(0,0,0,0.7); border-radius: 4px;
            color: var(--text-dark);
        }
        .modal h3 { font-family: 'Cinzel Decorative', cursive; color: var(--tan-leather); text-align: center; }

        /* 輸入框美化 - 羊皮紙凹陷感 */
        input, select { 
            background: rgba(255,255,255,0.5) !important; 
            border: 2px solid var(--paper-border) !important; 
            color: var(--text-dark) !important;
            border-radius: 2px !important;
            font-family: 'Noto Serif TC', serif !important;
        }
        input:focus, select:focus { border-color: var(--tan-leather) !important; outline: none; }

        /* 按鈕美化 - 鍛造金屬感 */
        button.primary { 
            background: #3e2723; color: #d7ccc8;
            text-transform: uppercase; letter-spacing: 2px; font-weight: bold;
            border: 2px solid #2c1a0b; border-radius: 4px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.5);
            font-family: 'IM Fell English SC', serif;
        }
        button.primary:hover { background: #5d4037; border-color: var(--gold-old); color: white; }
        
        /* 我要併桌按鈕 - 復古綠 */
        .join-btn-medieval {
            background: var(--green-old) !important; color: white !important; border: none !important;
        }
        .join-btn-medieval:hover { filter: brightness(1.1); }

        /* 同步更新按鈕 - 焦炭色 */
        .refresh-btn { border-color: #3e2723 !important; color: #3e2723 !important; background: transparent !important; }
        .refresh-btn:hover { background: rgba(0,0,0,0.05) !important; }

        @keyframes slideIn { from { top: -20px; opacity: 0; } to { top: 30px; opacity: 1; } }

        /* 捲軸手寫化 */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: var(--wood-dark); }
        ::-webkit-scrollbar-thumb { background: var(--tan-leather); border-radius: 2px; }
    </style>
</head>
<body>

<div id="toast"></div>

<div style="display:flex; justify-content:space-between; align-items:flex-end; margin-bottom: 30px; border-bottom: 2px solid var(--tan-leather); padding-bottom: 15px;">
    <div>
        <h2 style="margin:0;">冒險者公會<span style="font-weight:100; font-size: 0.8em; opacity: 0.7; font-family:'Noto Serif TC'">招募版</span></h2>
        <div id="conn-hint" style="font-size: 12px; margin-top: 5px; color: #888;">看板狀態: <span id="status-text">連線中...</span></div>
    </div>
    <button class="refresh-btn" onclick="manualRefresh()" style="background:transparent; cursor:pointer; width:auto; padding: 8px 15px; font-family:'Noto Serif TC'">
        同步公會紀錄
    </button>
</div>

<div id="dateSelector" style="margin-bottom: 30px; display:flex; gap:5px; overflow-x: auto; white-space: nowrap;"></div>
<div id="operatingBoard" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px;"></div>

<h3 style="margin-top:50px; color: var(--gold-old); font-size: 1.1em; letter-spacing: 4px; font-family: 'IM Fell English SC', serif;">ACTVE QUESTS / 招募中任務</h3>
<div id="bookingList">資料讀取中...</div>

<div id="bookingModal" class="overlay">
    <div class="modal">
        <h3>發起新的召集</h3>
        <select id="userGame" onchange="toggleMax()">
            <option value="阿瓦隆" data-max="10">阿瓦隆 (10人)</option>
            <option value="TRPG" data-max="4">TRPG (4人)</option>
            <option value="自選桌遊" data-max="6">自選桌遊 (6人)</option>
        </select>
        <input type="text" id="userTitle" placeholder="公會標題 (例如: 豆柴冒險團)">
        <div style="display:flex; gap:10px; align-items: center; margin-bottom: 10px;">
            <select id="userStartSelect" style="margin:0;"></select> 至 <select id="userEndSelect" style="margin:0;"></select>
        </div>
        <select id="userJoinMode">
            <option value="true">🟢 開放倂桌 (公會公開)</option>
            <option value="false">🔒 私人團 (私人聘僱)</option>
        </select>
        <label style="font-size: 0.9em; color: #666; font-family:'Noto Serif TC'">起始人數</label>
        <select id="pCount" onchange="genInputs()"></select>
        <div id="nameFields"></div>
        <button class="primary" onclick="confirmBooking()">送出公會申請</button>
        <button onclick="closeModal('bookingModal')" style="background:transparent; border: 1px solid #999; color: #888;">取消</button>
    </div>
</div>

<div id="joinModal" class="overlay">
    <div class="modal">
        <h3>申請加入冒險</h3>
        <div id="joinFields"></div>
        <button id="joinConfirmBtn" class="primary" onclick="confirmJoin()">確定加入</button>
        <button onclick="closeModal('joinModal')" style="background:transparent; border: 1px solid #999; color: #888;">取消</button>
    </div>
</div>

<script>
    // --- JS 部分邏輯完全延續前版，僅微調提示字眼與成功邏輯 ---
    const API_URL = "https://script.google.com/macros/s/AKfycbwNCsVr993_vYwObLyu2ftHEkpP54CYFg72-K3PGG4Hyt4ibuEglsVWoSDJ5Op71fooeQ/exec";
    const SERVERS = ["伊弗利特", "利維坦", "迦樓羅", "鳳凰", "奧汀", "泰坦"];
    let allData = [], currentViewDate = null, activeOp = null, targetBk = null;

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.style.display = 'block';
        setTimeout(() => { t.style.display = 'none'; }, 3000);
    }

    function manualRefresh() {
        fetchData();
        showToast("🔄 公會紀錄更新中...");
    }

    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    window.handleResponse = function(data) {
        allData = data;
        document.getElementById('status-text').innerText = "ONLINE";
        document.getElementById('status-text').style.color = "#2ecc71";
        render();
    };

    function fetchData() {
        const old = document.getElementById('jsonp-fetch');
        if(old) old.remove();
        const script = document.createElement('script');
        script.id = 'jsonp-fetch';
        script.src = `${API_URL}?callback=handleResponse&t=${Date.now()}`;
        document.body.appendChild(script);
    }

    function render() {
        const allDates = [...new Set(allData.map(i => i.date))].filter(d => d).sort();
        if(!currentViewDate && allDates.length > 0) currentViewDate = allDates[0];
        
        document.getElementById('dateSelector').innerHTML = allDates.map(d => 
            `<div class="date-tab ${currentViewDate===d?'active':''}" onclick="currentViewDate='${d}'; render();">${d}</div>`
        ).join('');

        const slots = allData.filter(i => i.type === 'slot' && String(i.date) === String(currentViewDate));
        const bks = allData.filter(i => i.type === 'booking' && String(i.date) === String(currentViewDate));

        document.getElementById('operatingBoard').innerHTML = slots.map(o => 
            `<div class="slot-btn" onclick="openBooking('${o.id}')">
                <span style="font-size:0.8em; color:var(--gold-old); display:block; font-family:'Noto Serif TC'">可召集</span>
                ${o.start} - ${o.end}
            </div>`
        ).join('') || "本日無召集時段";
        
        document.getElementById('bookingList').innerHTML = bks.map(b => {
            const isPrivate = String(b.names).includes("[私人]");
            const cleanNames = String(b.names).replace("[私人] ", "");
            const nameList = cleanNames ? cleanNames.split(', ') : [];
            const percent = Math.min((nameList.length / (parseInt(b.max) || 1)) * 100, 100);
            
            return `<div class="booking-card ${b.status}">
                <div class="mode-badge" style="background:${isPrivate ? var('--red-old') : var('--green-old')}; color:white;">${isPrivate ? 'PRIVATE' : 'OPEN'}</div>
                <div style="color:var(--tan-leather); font-size:0.85em; margin-bottom:5px; font-family:'Noto Serif TC'">任務項目: ${b.game}</div>
                <strong style="font-size:1.15em;">${b.title}</strong>
                <div class="progress-container"><div class="progress-bar" style="width:${percent}%"></div></div>
                <div style="display:flex; justify-content:space-between; font-size: 0.85em; opacity:0.9; font-family:'Noto Serif TC'">
                    <span>🕒 召集時間: ${b.start}</span>
                    <span>👥 成員: ${nameList.length} / ${b.max}人</span>
                </div>
                ${(b.status === 'success' && nameList.length < b.max && !isPrivate) ? 
                    `<button class="primary join-btn-medieval" onclick="openJoin('${b.id}')" style="margin-top:15px; padding:10px; font-size:0.9em; width:100px;">加入冒險</button>` : ''}
            </div>`;
        }).join('') || "NO ACTIVE PARTIES";
    }

    // --- (其餘 JS 函數 openBooking, toggleMax, genInputs, confirmBooking, confirmJoin 完全保持不變) ---
    function openBooking(id) { activeOp = allData.find(i => i.id === id); const genOptions = (s, e) => { let h = "", c = new Date("2024-01-01T"+s), stop = new Date("2024-01-01T"+e); while(c <= stop) { let t = c.toTimeString().substring(0, 5); h += `<option value="${t}">${t}</option>`; c.setMinutes(c.getMinutes() + 30); } return h; }; document.getElementById('userStartSelect').innerHTML = genOptions(activeOp.start, activeOp.end); document.getElementById('userEndSelect').innerHTML = genOptions(activeOp.start, activeOp.end); document.getElementById('bookingModal').style.display = 'flex'; toggleMax(); }
    function toggleMax() { const game = document.getElementById('userGame'); const maxVal = game.options[game.selectedIndex].getAttribute('data-max'); let h = ""; for(let i=1; i<=maxVal; i++) h += `<option value="${i}">${i}人</option>`; document.getElementById('pCount').innerHTML = h; genInputs(); }
    function genInputs() { const count = document.getElementById('pCount').value; const div = document.getElementById('nameFields'); div.innerHTML = ""; const sOpts = SERVERS.map(s => `<option value="${s}">${s}</option>`).join(''); for(let i=0; i<count; i++) div.innerHTML += `<div class="p-row"><select class="s-v" style="width:100px;">${sOpts}</select><input type="text" class="n-v" placeholder=" Player ID"></div>`; }
    function openJoin(id) { targetBk = allData.find(i => i.id === id); const sOpts = SERVERS.map(s => `<option value="${s}">${s}</option>`).join(''); document.getElementById('joinFields').innerHTML = `<div class="p-row"><select id="jServer">${sOpts}</select><input type="text" id="jName" placeholder="名字(ID)"></div>`; document.getElementById('joinModal').style.display = 'flex'; }
    function confirmJoin() { const n = document.getElementById('jName').value.trim(); if(!n) return alert("Please enter Player ID"); const newNames = targetBk.names + ", " + document.getElementById('jServer').value + "@" + n; fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: "update_names", id: targetBk.id, names: newNames }) }).then(() => { showToast("✅ 加入申請已送出"); closeModal('joinModal'); setTimeout(fetchData, 1500); }); }
    function confirmBooking() { const names = []; document.querySelectorAll('#nameFields .p-row').forEach(g => { const nv = g.querySelector('.n-v').value.trim(); if(nv) names.push(g.querySelector('.s-v').value + "@" + nv); }); if(names.length === 0) return alert("Min. 1 Player required"); const game = document.getElementById('userGame'); const maxVal = game.options[game.selectedIndex].getAttribute('data-max'); const namesStr = (document.getElementById('userJoinMode').value === "false" ? "[私人] " : "") + names.join(", "); const payload = { action: "insert", data: { id: "bk_" + Date.now(), date: activeOp.date, start: document.getElementById('userStartSelect').value, end: document.getElementById('userEndSelect').value, game: game.value, title: document.getElementById('userTitle').value || "Adventure Party", names: namesStr, status: "pending", type: "booking", max: maxVal } }; fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) }).then(() => { showToast("🚀 召集申請已送出"); closeModal('bookingModal'); setTimeout(fetchData, 1500); }); }

    window.onload = fetchData;
    setInterval(fetchData, 60000);
</script>
</body>
</html>
